name: Deploy content to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Generate Cloudflare content JSON
        run: npm run content:generate
        env:
          PUBLIC_CONTENT_BASE_URL: https://free-will-content.pages.dev

      - name: Prepare static content
        run: |
          rm -rf public
          mkdir -p public/v2 public/assets
          cp -R v2/*.json public/v2/
          cp -R assets/daily-images-watermarked public/assets/daily-images-watermarked

      - name: Create Cloudflare Pages project if needed
        run: npx --yes wrangler@4 pages project create free-will-content --production-branch=main || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: npx --yes wrangler@4 pages deploy public --project-name=free-will-content --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
